<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>E-COMMERCE-PROJECT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <nav class="navbar navbar-expand-lg bg-body-tertiary mt-3 rounded-2">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Easy<span class="text-primary">Mart</span></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            
                        </li>
                        <li class="nav-item">
                            <button class="btn btn-full  ms-2" onclick="showModal()">🛒Cart</button>
                        </li>
                        <button class="btn btn-full ms-2" onclick="showModal1()"> Add Product</button>
                    </ul>
                   
                </div>
            </div>
        </nav>
    </div>

    <main>
        <div class="container">
            <div class="row" id="product-list">
            </div>
        </div>

        <!-- Modal -->
        <div class="modal fade" id="cartItem-list" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
            aria-labelledby="staticBackdropLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title cart-modal fs-5" id="staticBackdropLabel">Card Items</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Product Image</th>
                                    <th>Product Name</th>
                                    <th>Quentity</th>
                                    <th>Price</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="cartTable">

                            </tbody>
                        </table>
                    </div>
                    <div class="modal-footer">
                        <div class="me-auto">
                            <div class="fw-bold" id="grand-total"></div>
                        </div>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="button" class="btn btn-primary" onclick="checkOut()">check out</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal -->
        <div class="modal fade" id="Add-Cart" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="exampleModalLabel">Add Cart</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="addProductForm" class="text-center">

                            <div class="mb-2">
                                <label for="productName">product Name :</label>
                                <input type="text" id="pname" placeholder="product name" class="mb-2">
                            </div>
                            <div class="mb-2">
                                <label for="productPrice">product Price :</label>
                                <input type="number" id="pprice" placeholder="price" class="mb-2">
                            </div>
                            <div class="mb-2">
                                <label for="productImage">product Image :</label>
                                <input type="text" id="pimage" placeholder="image url" class="mb-2">

                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Close</button>
                        <button type="submit" class="btn btn-primary" onclick="addProduct()">Add Product</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="UpdateProductModal" tabindex="-1" aria-labelledby="exampleModalLabel"
            aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="exampleModalLabel">Update Product detail</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="UpdateproductForm">
                            <div class="mb-2">
                                <label for="UpdateProductName">product Name :</label>
                                <input type="text" id="UpdateProductName" placeholder="product name" class="mb-2">
                            </div>
                            <div class="mb-2">
                                <label for="UpdateProductPrice">product Price :</label>
                                <input type="number" id="UpdateProductPrice" placeholder="price" class="mb-2">
                            </div>
                            <div class="mb-2">
                                <label for="UpdateProductImage">product Image :</label>
                                <input type="text" id="UpdateProductImage" placeholder="image url" class="mb-2">

                            </div>

                            <div class="modal-footer">
                                <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Close</button>
                                <button type="submit" class="btn btn-primary">Update Product</button>
                            </div>
                        </form>
                    </div>

                </div>
            </div>
        </div>


    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
